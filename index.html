<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Proxy Builder – makeplayingcards.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 2rem;
      color: #c8a96e;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* ── Input section ─────────────────────────────────────── */
    .input-section {
      background: #16213e;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #c8a96e;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #2a4a7f;
      border-radius: 4px;
      padding: 0.75rem;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: #c8a96e;
    }

    textarea::placeholder { color: #557; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .hint {
      color: #666;
      font-size: 0.82rem;
      margin-left: auto;
    }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn {
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: filter 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary { background: #c8a96e; color: #1a1a2e; }
    .btn-primary:hover { filter: brightness(1.12); }

    .btn-secondary { background: #0f3460; color: #e0e0e0; border: 1px solid #c8a96e; }
    .btn-secondary:hover { filter: brightness(1.2); }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }

    /* ── Status / progress ─────────────────────────────────── */
    #status {
      display: none;
      padding: 0.9rem 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }

    #status.info    { background: #0f3460; border-left: 4px solid #4a90e2; }
    #status.error   { background: #3d1212; border-left: 4px solid #e24a4a; }
    #status.success { background: #123d12; border-left: 4px solid #4ae24a; }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: #333;
      border-radius: 3px;
      margin-top: 0.6rem;
      overflow: hidden;
      display: none;
    }

    .progress-fill {
      height: 100%;
      background: #c8a96e;
      transition: width 0.25s ease;
      width: 0%;
    }

    /* ── Download / print controls ─────────────────────────── */
    #controls {
      display: none;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    /* ── Card grid ─────────────────────────────────────────── */
    #card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 1rem;
    }

    .card-item {
      background: #16213e;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #2a3a5a;
    }

    .card-item canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .card-info {
      display: flex;
      align-items: center;
      padding: 0.45rem 0.55rem;
      gap: 0.4rem;
      font-size: 0.78rem;
    }

    .card-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #c8c8c8;
    }

    .card-error {
      background: #3d1212;
      color: #e24a4a;
      padding: 1rem 0.75rem;
      font-size: 0.82rem;
      text-align: center;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.3rem;
    }

    .card-error .err-name { font-weight: 700; font-size: 0.9rem; }
    .card-error .err-msg  { color: #c87070; font-size: 0.75rem; }

    /* ── Print styles ──────────────────────────────────────── */
    @media print {
      body { background: #fff; }

      .input-section,
      #controls,
      #status,
      h1,
      .subtitle { display: none !important; }

      #card-grid {
        display: grid;
        /* 3 cards across on a US Letter page at 300 dpi */
        grid-template-columns: repeat(3, 744px);
        gap: 0;
        padding: 0;
      }

      .card-item {
        background: none;
        border: none;
        border-radius: 0;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .card-item canvas {
        width: 744px !important;
        height: 1038px !important;
      }

      .card-info { display: none; }
      .card-error { display: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🃏 MTG Proxy Builder</h1>
  <p class="subtitle">
    Generate print-ready proxy cards for makeplayingcards.com using Scryfall card art &nbsp;•&nbsp;
    744 × 1038 px &nbsp;•&nbsp; 72 px black border &nbsp;•&nbsp; 300 DPI PNG
  </p>

  <div class="input-section">
    <label for="cardList">Card List — one card per line (optional quantity prefix)</label>
    <textarea
      id="cardList"
      spellcheck="false"
      placeholder="4x Lightning Bolt&#10;2 Counterspell&#10;1x Black Lotus&#10;Force of Will"
    ></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="generateBtn">Generate Proxies</button>
      <button class="btn btn-secondary" id="clearBtn">Clear</button>
      <span class="hint">Supported formats: &nbsp;<code>4x Card Name</code> &nbsp;or&nbsp; <code>4 Card Name</code> &nbsp;or&nbsp; <code>Card Name</code></span>
    </div>
  </div>

  <div id="status">
    <span id="status-text"></span>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div id="controls">
    <button class="btn btn-primary"   id="downloadAllBtn">⬇ Download All (ZIP)</button>
    <button class="btn btn-secondary" id="printBtn">🖨 Print</button>
  </div>

  <div id="card-grid"></div>
</div>

<!-- JSZip for bundled download -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>

<script>
'use strict';

/* ──────────────────────────────────────────────────────────────
   Constants
────────────────────────────────────────────────────────────── */
const CARD_W      = 744;
const CARD_H      = 1038;
const BORDER      = 72;
const OUTPUT_DPI  = 300;
const INNER_W     = CARD_W - 2 * BORDER;  // 600
const INNER_H     = CARD_H - 2 * BORDER;  // 894

const SCRYFALL    = 'https://api.scryfall.com';
const DELAY_MS    = 100; // respect Scryfall's 100 ms rate-limit recommendation

/* ──────────────────────────────────────────────────────────────
   State
────────────────────────────────────────────────────────────── */
const cardCache   = new Map();   // name.toLowerCase() → card data
let   generated   = [];          // { canvas, name }[]

/* ──────────────────────────────────────────────────────────────
   Utilities
────────────────────────────────────────────────────────────── */
const sleep = ms => new Promise(r => setTimeout(r, ms));

function safeFilename(name) {
  return name.replace(/[^a-z0-9]/gi, '_').replace(/_+/g, '_').toLowerCase();
}

/* ──────────────────────────────────────────────────────────────
   Card-list parser
   Supports:  "4x Lightning Bolt", "4 Lightning Bolt", "Lightning Bolt"
   Comment lines starting with # or // are ignored.
────────────────────────────────────────────────────────────── */
function parseCardList(text) {
  const cards = [];
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line || line.startsWith('#') || line.startsWith('//')) continue;

    const match = line.match(/^(\d+)[xX]?\s+(.+)$/);
    if (match) {
      const qty  = Math.min(Math.max(parseInt(match[1], 10), 1), 99);
      const name = match[2].trim();
      for (let i = 0; i < qty; i++) cards.push(name);
    } else {
      cards.push(line);
    }
  }
  return cards;
}

/* ──────────────────────────────────────────────────────────────
   Scryfall API
────────────────────────────────────────────────────────────── */
async function fetchCard(name) {
  const key = name.toLowerCase();
  if (cardCache.has(key)) return cardCache.get(key);

  const res = await fetch(`${SCRYFALL}/cards/named?fuzzy=${encodeURIComponent(name)}`);
  if (!res.ok) {
    let msg = `Card not found: "${name}"`;
    try {
      const body = await res.json();
      if (body.details) msg = body.details;
    } catch (_) { /* ignore */ }
    throw new Error(msg);
  }
  const data = await res.json();
  cardCache.set(key, data);
  return data;
}

/* ──────────────────────────────────────────────────────────────
   Image utilities
────────────────────────────────────────────────────────────── */
function getImageUrl(cardData) {
  if (cardData.image_uris) {
    return cardData.image_uris.large || cardData.image_uris.normal || null;
  }
  // Double-faced cards – use front face
  if (Array.isArray(cardData.card_faces) && cardData.card_faces[0]?.image_uris) {
    const face = cardData.card_faces[0].image_uris;
    return face.large || face.normal || null;
  }
  return null;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Failed to load card image'));
    img.src = url;
  });
}

/* ──────────────────────────────────────────────────────────────
   Card renderer
   Output: 744 × 1038 canvas with 72px black border.
   The card art is scaled to cover the 600 × 894 inner area
   (object-fit: cover) to avoid letterboxing.
────────────────────────────────────────────────────────────── */
async function renderCard(cardData) {
  const canvas = document.createElement('canvas');
  canvas.width  = CARD_W;
  canvas.height = CARD_H;
  const ctx = canvas.getContext('2d');

  // Solid black background (border)
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, CARD_W, CARD_H);

  const imgUrl = getImageUrl(cardData);
  if (imgUrl) {
    const img = await loadImage(imgUrl);

    // Cover-fit: fill inner area, crop edges if aspect ratios differ
    const scale = Math.max(INNER_W / img.width, INNER_H / img.height);
    const sw = img.width  * scale;
    const sh = img.height * scale;
    const dx = BORDER + (INNER_W - sw) / 2;
    const dy = BORDER + (INNER_H - sh) / 2;

    // Clip to inner area so the image never bleeds into the border
    ctx.save();
    ctx.beginPath();
    ctx.rect(BORDER, BORDER, INNER_W, INNER_H);
    ctx.clip();
    ctx.drawImage(img, dx, dy, sw, sh);
    ctx.restore();
  }

  return canvas;
}

/* ──────────────────────────────────────────────────────────────
   PNG DPI embedding (pHYs chunk, 300 DPI = 11811 px/m)
────────────────────────────────────────────────────────────── */
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[i] = c;
  }
  return t;
})();

function crc32(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) crc = CRC_TABLE[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function be32(n) {
  return [(n >>> 24) & 0xFF, (n >>> 16) & 0xFF, (n >>> 8) & 0xFF, n & 0xFF];
}

/**
 * Insert a pHYs chunk (DPI metadata) right after the IHDR chunk in a PNG byte array.
 * PNG layout: 8-byte sig + IHDR (4+4+13+4=25 bytes) = 33 bytes, then next chunk.
 */
function embedDPI(pngBytes, dpi) {
  const ppm = Math.round(dpi * 39.3701); // pixels per metre

  // pHYs data: X ppu (4) + Y ppu (4) + unit=metre (1) = 9 bytes
  const physData = new Uint8Array([...be32(ppm), ...be32(ppm), 1]);
  const chunkType = new Uint8Array([0x70, 0x48, 0x59, 0x73]); // 'pHYs'

  // CRC covers chunk type + chunk data
  const crcInput = new Uint8Array(4 + 9);
  crcInput.set(chunkType, 0);
  crcInput.set(physData,  4);
  const crcVal = crc32(crcInput);

  // Full chunk: length(4) + type(4) + data(9) + CRC(4) = 21 bytes
  const chunk = new Uint8Array([
    0, 0, 0, 9,           // data length
    ...chunkType,         // chunk type 'pHYs'
    ...physData,          // chunk data
    ...be32(crcVal),      // CRC32
  ]);

  // Insert after IHDR (offset 33)
  const out = new Uint8Array(pngBytes.length + chunk.length);
  out.set(pngBytes.slice(0, 33),            0);
  out.set(chunk,                            33);
  out.set(pngBytes.slice(33), 33 + chunk.length);
  return out;
}

/** Convert a canvas to a PNG Blob with 300 DPI metadata. */
function canvasToBlob300dpi(canvas) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (!blob) { reject(new Error('Canvas toBlob failed')); return; }
      blob.arrayBuffer().then(buf => {
        const withDPI = embedDPI(new Uint8Array(buf), OUTPUT_DPI);
        resolve(new Blob([withDPI], { type: 'image/png' }));
      }).catch(reject);
    }, 'image/png');
  });
}

/* ──────────────────────────────────────────────────────────────
   UI helpers
────────────────────────────────────────────────────────────── */
function showStatus(msg, type = 'info', pct = null) {
  const el    = document.getElementById('status');
  const text  = document.getElementById('status-text');
  const bar   = document.getElementById('progress-bar');
  const fill  = document.getElementById('progress-fill');

  el.className      = type;
  el.style.display  = 'block';
  text.textContent  = msg;

  if (pct !== null) {
    bar.style.display  = 'block';
    fill.style.width   = `${pct}%`;
  } else {
    bar.style.display  = 'none';
  }
}

function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href    = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

/* ──────────────────────────────────────────────────────────────
   Per-card download
────────────────────────────────────────────────────────────── */
async function downloadCard(idx) {
  const { canvas, name } = generated[idx];
  const blob = await canvasToBlob300dpi(canvas);
  triggerDownload(blob, `${safeFilename(name)}.png`);
}

/* ──────────────────────────────────────────────────────────────
   Download all as ZIP
────────────────────────────────────────────────────────────── */
async function downloadAll() {
  if (generated.length === 0) return;

  const btn = document.getElementById('downloadAllBtn');
  btn.disabled = true;

  try {
    // JSZip may fail to load (ad blockers / offline); fall back to one-by-one
    if (typeof JSZip === 'undefined') {
      for (let i = 0; i < generated.length; i++) {
        showStatus(`Downloading ${i + 1}/${generated.length}…`, 'info', Math.round(((i + 1) / generated.length) * 100));
        await downloadCard(i);
        await sleep(300);
      }
      showStatus('✓ All cards downloaded.', 'success');
      return;
    }

    const zip        = new JSZip();
    const nameCounts = {};

    for (let i = 0; i < generated.length; i++) {
      showStatus(`Preparing ${i + 1}/${generated.length}…`, 'info', Math.round((i / generated.length) * 90));
      const { canvas, name } = generated[i];
      const blob = await canvasToBlob300dpi(canvas);
      const base = safeFilename(name);
      nameCounts[base] = (nameCounts[base] || 0) + 1;
      const cnt  = nameCounts[base];
      const file = cnt === 1 ? `${base}.png` : `${base}_${cnt}.png`;
      zip.file(file, blob);
    }

    showStatus('Compressing ZIP…', 'info', 95);
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    triggerDownload(zipBlob, 'mtg_proxies.zip');
    showStatus(`✓ Downloaded ${generated.length} card(s) as mtg_proxies.zip`, 'success');
  } catch (err) {
    showStatus(`Error creating ZIP: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

/* ──────────────────────────────────────────────────────────────
   Main generate function
────────────────────────────────────────────────────────────── */
async function generateProxies() {
  const textareaEl  = document.getElementById('cardList');
  const grid        = document.getElementById('card-grid');
  const controls    = document.getElementById('controls');
  const generateBtn = document.getElementById('generateBtn');

  const text = textareaEl.value.trim();
  if (!text) {
    showStatus('Please enter at least one card name.', 'error');
    return;
  }

  const cardNames = parseCardList(text);
  if (cardNames.length === 0) {
    showStatus('No valid card names found.', 'error');
    return;
  }

  // Reset UI
  generateBtn.disabled      = true;
  grid.innerHTML            = '';
  controls.style.display    = 'none';
  generated                 = [];

  // Deduplicate for API requests
  const uniqueNames = [...new Set(cardNames.map(n => n.toLowerCase()))];

  // ── Phase 1: Fetch card data ──────────────────────────────
  const fetchedMap = new Map(); // lower-name → card data or Error

  for (let i = 0; i < uniqueNames.length; i++) {
    const name = uniqueNames[i];
    showStatus(
      `Fetching card ${i + 1} of ${uniqueNames.length}: "${cardNames.find(n => n.toLowerCase() === name)}"`,
      'info',
      Math.round((i / uniqueNames.length) * 50),
    );

    try {
      const data = await fetchCard(name);
      fetchedMap.set(name, data);
    } catch (err) {
      fetchedMap.set(name, err);
    }

    // Respect Scryfall rate limit between requests
    if (i < uniqueNames.length - 1) await sleep(DELAY_MS);
  }

  // ── Phase 2: Render cards ─────────────────────────────────
  for (let i = 0; i < cardNames.length; i++) {
    const inputName = cardNames[i];
    const key       = inputName.toLowerCase();
    const result    = fetchedMap.get(key);

    showStatus(
      `Rendering ${i + 1} of ${cardNames.length}…`,
      'info',
      50 + Math.round((i / cardNames.length) * 50),
    );

    const item = document.createElement('div');
    item.className = 'card-item';

    if (result instanceof Error) {
      item.innerHTML = `
        <div class="card-error">
          <div class="err-name">⚠ ${escapeHtml(inputName)}</div>
          <div class="err-msg">${escapeHtml(result.message)}</div>
        </div>`;
    } else {
      try {
        const canvas   = await renderCard(result);
        const cardName = result.name;
        const idx      = generated.length;
        generated.push({ canvas, name: cardName });

        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = `
          <span class="card-name" title="${escapeHtml(cardName)}">${escapeHtml(cardName)}</span>
          <button class="btn btn-secondary btn-sm" aria-label="Download ${escapeHtml(cardName)}">⬇</button>`;
        info.querySelector('button').addEventListener('click', () => downloadCard(idx));

        item.appendChild(canvas);
        item.appendChild(info);
      } catch (err) {
        item.innerHTML = `
          <div class="card-error">
            <div class="err-name">⚠ ${escapeHtml(inputName)}</div>
            <div class="err-msg">${escapeHtml(err.message)}</div>
          </div>`;
      }
    }

    grid.appendChild(item);
  }

  generateBtn.disabled = false;

  if (generated.length > 0) {
    controls.style.display = 'flex';
    showStatus(`✓ Generated ${generated.length} proxy card(s). Ready to download!`, 'success');
  } else {
    showStatus('No cards could be generated. Check card names and try again.', 'error');
  }
}

/* Simple HTML escaping to prevent XSS from card names */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ──────────────────────────────────────────────────────────────
   Event listeners
────────────────────────────────────────────────────────────── */
document.getElementById('generateBtn').addEventListener('click', generateProxies);

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('cardList').value  = '';
  document.getElementById('card-grid').innerHTML = '';
  document.getElementById('controls').style.display = 'none';
  generated = [];
  hideStatus();
});

document.getElementById('downloadAllBtn').addEventListener('click', downloadAll);

document.getElementById('printBtn').addEventListener('click', () => window.print());

// Allow Ctrl+Enter / Cmd+Enter in the textarea to trigger generation
document.getElementById('cardList').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateProxies();
});
</script>
</body>
</html>
